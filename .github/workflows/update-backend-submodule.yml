name: Update backend submodule

on:
  repository_dispatch:
    types: [backend-updated]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-backend-submodule-main
  cancel-in-progress: false

jobs:
  update-submodule:
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.client_payload.source_repo == 'NicholasEmery/newsly-portal-backend'

    env:
      ACCESS_EXPIRES_IN: ${{ secrets.ACCESS_EXPIRES_IN }}
      AUTH_FRONTEND_ORIGIN: ${{ secrets.AUTH_FRONTEND_ORIGIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      PORT: ${{ secrets.PORT }}
      REFRESH_EXPIRES_DAYS: ${{ secrets.REFRESH_EXPIRES_DAYS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      UPLOAD_DIR_DEV: ${{ secrets.UPLOAD_DIR_DEV }}
      UPLOAD_DIR_PROD: ${{ secrets.UPLOAD_DIR_PROD }}

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update backend submodule
        run: |
          git submodule update --remote backend

      - name: Commit and push submodule update
        run: |
          if git status --porcelain | grep -q "backend"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend
            git commit -m "chore: update backend submodule"
            git pull --rebase origin main
            git push
          else
            echo "No changes in backend submodule."
          fi
