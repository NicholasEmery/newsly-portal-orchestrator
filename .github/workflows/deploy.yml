name: Deploy to server

on:
  workflow_run:
    workflows:
      - Update backend submodule
      - Update frontend submodule
    types:
      - completed

  workflow_dispatch:

jobs:
  prepare-backend-env:
    runs-on: [self-hosted, deploy]
    environment:
      name: Environments Backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure backend .env
        shell: bash
        run: |
          set -e
          mkdir -p backend
          if [ -f backend/.env ]; then
            echo "Usando backend/.env já existente"
          else
            echo "Gerando backend/.env a partir dos secrets"
            {
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "PORT=${{ secrets.PORT }}"
              # demais variáveis...
            } > backend/.env
          fi
          echo ">>> backend/.env pronto"
          cat backend/.env

      - name: Upload backend env artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-env
          path: backend/.env
          include-hidden-files: true
          if-no-files-found: error

  prepare-frontend-env:
    runs-on: [self-hosted, deploy]
    environment:
      name: Environments Frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure frontend .env
        shell: bash
        run: |
          set -e
          mkdir -p frontend
          if [ -f frontend/.env ]; then
            echo "Usando frontend/.env já existente"
          else
            echo "Gerando frontend/.env a partir dos secrets"
            {
              echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}"
              echo "NODE_ENV=${{ secrets.NODE_ENV }}"
              # demais variáveis...
            } > frontend/.env
          fi
          echo ">>> frontend/.env pronto"
          cat frontend/.env

      - name: Upload frontend env artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-env
          path: frontend/.env
          include-hidden-files: true
          if-no-files-found: error

  deploy:
    needs:
      - prepare-backend-env
      - prepare-frontend-env
    runs-on: [self-hosted, deploy]
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Download backend env artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-env
          path: backend

      - name: Download frontend env artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-env
          path: frontend

      - name: Check generated env files
        shell: bash
        run: |
          set -e
          test -f backend/.env
          test -f frontend/.env
          echo ">>> Arquivos .env encontrados"
          echo ">>> Conteúdo backend/.env:"
          cat backend/.env
          echo ">>> Conteúdo frontend/.env:"
          cat frontend/.env

      - name: Deploy with docker compose
        shell: bash
        run: |
          set -e
          # Exporta variáveis dos arquivos .env para o ambiente
          export $(cat backend/.env | xargs)
          export $(cat frontend/.env | xargs)

          echo "[deploy] Buildando containers"
          docker compose build --no-cache

          echo "[deploy] Subindo containers"
          docker compose up -d

          echo "[deploy] OK"

      - name: Notify Microsoft Teams
        if: success()
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          set -e
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL não configurado. Pulando notificação."
            exit 0
          fi
          repo="${GITHUB_REPOSITORY}"
          branch="${GITHUB_REF_NAME}"
          actor="${GITHUB_ACTOR}"
          sha="${GITHUB_SHA}"
          run_id="${GITHUB_RUN_ID}"
          run_url="https://github.com/${repo}/actions/runs/${run_id}"
          payload="{\"title\":\"Deploy concluído\",\"text\":\"Deploy do repositório ${repo} na branch ${branch} foi concluído com sucesso. Autor: ${actor}. Commit: ${sha:0:7}. Veja detalhes: ${run_url}\"}"
          curl -H "Content-Type: application/json" -d "$payload" "$TEAMS_WEBHOOK_URL"
