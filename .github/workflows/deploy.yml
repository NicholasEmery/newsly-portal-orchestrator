name: Deploy to server

on:
  workflow_run:
    workflows: ["Update backend submodule", "Update frontend submodule"]
    types:
      - completed
  workflow_dispatch:

jobs:
  prepare-backend-env:
    runs-on: [self-hosted, deploy]
    environment:
      name: Environments Backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure backend .env
        run: |
          set -e
          mkdir -p backend

          if [ -f backend/.env ]; then
            echo "Usando backend/.env já existente"
          else
            echo "Gerando backend/.env a partir dos secrets"
            cat <<EOF > backend/.env
            ACCESS_EXPIRES_IN=${{ secrets.ACCESS_EXPIRES_IN }}
            AUTH_FRONTEND_ORIGIN=${{ secrets.AUTH_FRONTEND_ORIGIN }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            PORT=${{ secrets.PORT }}
            REFRESH_EXPIRES_DAYS=${{ secrets.REFRESH_EXPIRES_DAYS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            UPLOAD_DIR_DEV=${{ secrets.UPLOAD_DIR_DEV }}
            UPLOAD_DIR_PROD=${{ secrets.UPLOAD_DIR_PROD }}
            EOF
          fi

          echo "backend/.env pronto"

      - name: Upload backend env artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-env
          path: backend/.env
          include-hidden-files: true
          if-no-files-found: error

  prepare-frontend-env:
    runs-on: [self-hosted, deploy]
    environment:
      name: Environments Frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure frontend .env
        run: |
          set -e
          mkdir -p frontend

          if [ -f frontend/.env ]; then
            echo "Usando frontend/.env já existente"
          else
            echo "Gerando frontend/.env a partir dos secrets"
            cat <<EOF > frontend/.env
            NEWSLY_DATA_SOURCE=${{ secrets.NEWSLY_DATA_SOURCE }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_ORIGIN=${{ secrets.NEXT_PUBLIC_APP_ORIGIN }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            EOF
          fi

          echo "frontend/.env pronto"

      - name: Upload frontend env artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-env
          path: frontend/.env
          include-hidden-files: true
          if-no-files-found: error

  deploy:
    needs: [prepare-backend-env, prepare-frontend-env]
    runs-on: [self-hosted, deploy]

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Download backend env artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-env
          path: backend

      - name: Download frontend env artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-env
          path: frontend

      - name: Check generated env files
        run: |
          test -f backend/.env
          test -f frontend/.env

      - name: Deploy with docker compose (self-hosted)
        run: |
          set -e
          echo "[deploy] Subindo containers"
          docker compose build --no-cache
          docker compose up -d
          echo "[deploy] OK"

      - name: Notify Microsoft Teams
        if: ${{ success() }}
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL não configurado. Pulando notificação."
            exit 0
          fi

          repo="${GITHUB_REPOSITORY}"
          branch="${GITHUB_REF_NAME}"
          actor="${GITHUB_ACTOR}"
          sha="${GITHUB_SHA}"
          run_id="${GITHUB_RUN_ID}"
          run_url="https://github.com/${repo}/actions/runs/${run_id}"

          payload='{"title":"Deploy concluído","text":"Deploy do repositório **'"${repo}"'** na branch **'"${branch}"'** foi concluído com sucesso. Autor: **'"${actor}"'**. Commit: '"${sha:0:7}"' (veja detalhes em '"${run_url}"')."}'

          curl -H "Content-Type: application/json" -d "$payload" "$TEAMS_WEBHOOK_URL"
