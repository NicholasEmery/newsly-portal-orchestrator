name: Deploy Frontend

on:
  workflow_run:
    workflows: ["Update frontend submodule"]
    types: [completed]

  workflow_dispatch:

jobs:
  prepare-frontend-env:
    runs-on: [self-hosted, deploy]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: Environments Frontend
    steps:
      - uses: actions/checkout@v4
      - name: Ensure frontend .env
        run: |
          set -e
          mkdir -p frontend
          if [ -f frontend/.env ]; then
            echo "Usando frontend/.env já existente"
          else
            {
              echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}"
              echo "NODE_ENV=production"
            } > frontend/.env
          fi
          cat frontend/.env
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-env
          path: frontend/.env
          include-hidden-files: true
          if-no-files-found: error

  deploy-frontend:
    needs: prepare-frontend-env
    runs-on: [self-hosted, deploy]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-env
          path: frontend
      - name: Deploy frontend
        run: |
          docker compose build frontend --no-cache
          docker compose up -d frontend
