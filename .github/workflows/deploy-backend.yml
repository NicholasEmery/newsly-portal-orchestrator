name: Deploy Backend

on:
  workflow_run:
    workflows: ["Update backend submodule"]
    types: [completed]
  workflow_dispatch:

jobs:
  prepare-backend-env:
    runs-on: [self-hosted, deploy]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: Environments Backend
    steps:
      - uses: actions/checkout@v4
      - name: Ensure backend .env
        run: |
          set -e
          mkdir -p backend
          {
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "PORT=${{ secrets.PORT }}"
          } > backend/.env
          cat backend/.env

  deploy-backend:
    needs: prepare-backend-env
    runs-on: [self-hosted, deploy]
    environment:
      name: Environments Backend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - name: Ensure backend .env
        run: |
          set -e
          mkdir -p backend
          {
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "PORT=${{ secrets.PORT }}"
          } > backend/.env
      - name: Deploy backend
        env:
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
          ACCESS_EXPIRES_IN: ${{ secrets.ACCESS_EXPIRES_IN }}
          REFRESH_EXPIRES_DAYS: ${{ secrets.REFRESH_EXPIRES_DAYS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          AUTH_FRONTEND_ORIGIN: ${{ secrets.AUTH_FRONTEND_ORIGIN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          UPLOAD_DIR_DEV: ${{ secrets.UPLOAD_DIR_DEV }}
          UPLOAD_DIR_PROD: ${{ secrets.UPLOAD_DIR_PROD }}
        run: |
          docker compose build backend --no-cache
          docker compose up -d backend
          echo "Backend atualizado e rodando"
