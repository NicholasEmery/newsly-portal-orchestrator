services:
  mongo:
    image: mongo:7
    container_name: newsly-mongo
    restart: unless-stopped
    volumes:
      - newsly-mongo-data:/data/db
    networks:
      - back-db-network
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      secrets:
        - source: backend_env
          target: dotenv
    container_name: newsly-backend
    image: newsly-backend:latest
    env_file:
      - ./backend/.env
    environment:
      - PORT=${BACKEND_PORT}
      - UPLOAD_DIR=/app/uploads
    read_only: true
    expose:
      - "${BACKEND_PORT}"
    tmpfs:
      - /tmp
      - /app/.tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - newsly-uploads:/app/uploads
    restart: unless-stopped
    networks:
      - backend-egress-network
      - front-back-network
      - back-db-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsly-frontend
    image: newsly-frontend:latest
    env_file:
      - ./frontend/.env
    environment:
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    read_only: true
    tmpfs:
      - /tmp
      - /app/.tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    restart: unless-stopped
    networks:
      - front-back-network

volumes:
  newsly-uploads:
  newsly-mongo-data:

networks:
  front-back-network:
    internal: true
    driver: bridge
  back-db-network:
    internal: true
    driver: bridge
  backend-egress-network:
    driver: bridge

secrets:
  backend_env:
    file: ./backend/.env
          
          
